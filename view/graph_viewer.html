<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>中医药知识图谱 · 管理控制台</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
  :root{
    --paper:#e8eae5; --panel:#f7f8f5; --line:#cfd4cc;
    --ink:#232a26; --ink-soft:#5f6a63; --celadon:#7d9b8c; --seal:#a8443a;
    --t-yaocai:#5e8c61; --t-fangji:#b4763f; --t-zhengzhuang:#a8443a;
    --t-zhenghou:#4a6fa5; --t-gongxiao:#7a6ba8; --t-jinji:#3f4a52; --t-wenxian:#8a8256;
    --mono:ui-monospace,"SFMono-Regular",Menlo,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);
       font:14px/1.6 system-ui,"PingFang SC","Microsoft YaHei",sans-serif;}
  header{display:flex;align-items:baseline;gap:18px;padding:14px 22px;
         border-bottom:1px solid var(--line);background:var(--panel)}
  h1{margin:0;font:600 19px/1.2 "Songti SC","SimSun",serif;letter-spacing:.06em}
  .tag{font:11px var(--mono);color:var(--ink-soft);border:1px solid var(--line);
       padding:2px 7px;border-radius:2px}
  .bar{margin-left:auto;display:flex;gap:8px;align-items:center}
  input,select,textarea,button{font:inherit;color:var(--ink);background:#fff;
       border:1px solid var(--line);border-radius:3px;padding:6px 9px}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--celadon);outline-offset:-1px}
  button{cursor:pointer;background:var(--ink);color:#fff;border-color:var(--ink)}
  button.ghost{background:#fff;color:var(--ink)}
  button.seal{background:var(--seal);border-color:var(--seal)}
  button:hover{opacity:.88}

  main{display:grid;grid-template-columns:220px 1fr 320px;height:calc(100vh - 55px)}
  aside{border-right:1px solid var(--line);background:var(--panel);overflow:auto;padding:14px}
  aside.right{border-right:none;border-left:1px solid var(--line)}
  .rail-title{font:600 12px/1 var(--mono);letter-spacing:.14em;color:var(--ink-soft);
       text-transform:uppercase;margin:4px 0 10px}
  /* 抽屉式类型清单：中药柜的一格一格 */
  .drawer{display:flex;align-items:center;gap:8px;padding:8px 10px;margin-bottom:5px;
       background:#fff;border:1px solid var(--line);border-left:4px solid var(--c);
       cursor:pointer;user-select:none}
  .drawer[aria-pressed="true"]{background:var(--ink);color:#fff;border-color:var(--ink);
       border-left-color:var(--c)}
  .drawer .n{margin-left:auto;font:11px var(--mono);opacity:.7}
  #chart{width:100%;height:100%}
  .right h3{margin:14px 0 6px;font:600 13px/1.4 system-ui}
  .kv{font:12px/1.7 var(--mono);white-space:pre-wrap;word-break:break-all;
      background:#fff;border:1px solid var(--line);padding:9px;border-radius:3px}
  .chip{display:inline-block;font:11px var(--mono);padding:1px 6px;border-radius:2px;color:#fff}
  .path{background:#fff;border:1px solid var(--line);border-left:3px solid var(--seal);
        padding:7px 9px;margin-bottom:6px;font-size:12.5px}
  .form{display:grid;gap:6px;margin-top:8px}
  .form input,.form select{width:100%}
  .row{display:flex;gap:6px}
  .row>*{flex:1}
  footer{position:fixed;bottom:0;left:220px;right:320px;padding:6px 14px;
     background:rgba(247,248,245,.94);border-top:1px solid var(--line);
     font:11px var(--mono);color:var(--ink-soft);display:flex;gap:16px}
  .err{color:var(--seal)}
  details summary{cursor:pointer;font-weight:600;margin-top:12px;font-size:13px}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<header>
  <h1>中医药知识图谱</h1>
  <span class="tag">任务2 · 图谱管理模块</span>
  <div class="bar">
    <input id="kw" placeholder="搜索实体，如 失眠 / 归脾汤" size="24" />
    <select id="depth"><option value="1">邻居 1 层</option><option value="2" selected>2 层</option><option value="3">3 层</option></select>
    <button id="btnSearch">检索</button>
    <button class="ghost" id="btnAll">全图</button>
  </div>
</header>

<main>
  <aside>
    <div class="rail-title">实体类型</div>
    <div id="drawers"></div>
    <div class="rail-title" style="margin-top:18px">关系路径</div>
    <div class="form">
      <input id="pSrc" placeholder="起点 id 或名称，如 失眠" />
      <input id="pTgt" placeholder="终点 id 或名称，如 酸枣仁" />
      <button class="seal" id="btnPath">求推理路径</button>
    </div>
    <div id="paths"></div>
  </aside>

  <div><div id="chart"></div></div>

  <aside class="right">
    <div class="rail-title">节点详情</div>
    <div id="detail" class="kv">点击图中节点查看；双击节点展开它的邻居。</div>

    <details>
      <summary>录入实体</summary>
      <div class="form">
        <input id="eName" placeholder="名称 *" />
        <select id="eType"></select>
        <input id="eAlias" placeholder="别名" />
        <input id="eDesc" placeholder="描述" />
        <button id="btnAddE">保存实体</button>
      </div>
    </details>

    <details>
      <summary>录入关系</summary>
      <div class="form">
        <input id="rSrc" placeholder="起点名称 *" />
        <select id="rRel"></select>
        <input id="rTgt" placeholder="终点名称 *" />
        <input id="rEv" placeholder="依据 evidence" />
        <button id="btnAddR">保存关系</button>
        <small id="relHint" style="color:var(--ink-soft)"></small>
      </div>
    </details>

    <details>
      <summary>批量导入</summary>
      <div class="form">
        <div class="row">
          <label class="ghost" style="border:1px solid var(--line);padding:6px;border-radius:3px;text-align:center;cursor:pointer">
            实体 CSV<input type="file" id="fE" accept=".csv" hidden></label>
          <label class="ghost" style="border:1px solid var(--line);padding:6px;border-radius:3px;text-align:center;cursor:pointer">
            关系 CSV<input type="file" id="fR" accept=".csv" hidden></label>
        </div>
        <div class="row">
          <a href="/api/import/template?kind=entity" download>下载实体模板</a>
          <a href="/api/import/template?kind=relation" download>下载关系模板</a>
        </div>
        <div id="impLog" class="kv" style="display:none"></div>
      </div>
    </details>
  </aside>
</main>

<footer><span id="statNode">节点 0</span><span id="statEdge">关系 0</span><span id="statMsg"></span></footer>

<script>
const API = location.origin + "/api";
const COLOR = {"药材":"var(--t-yaocai)","方剂":"var(--t-fangji)","症状":"var(--t-zhengzhuang)",
  "证候":"var(--t-zhenghou)","功效":"var(--t-gongxiao)","禁忌":"var(--t-jinji)","文献":"var(--t-wenxian)"};
const HEX = {"药材":"#5e8c61","方剂":"#b4763f","症状":"#a8443a","证候":"#4a6fa5",
  "功效":"#7a6ba8","禁忌":"#3f4a52","文献":"#8a8256"};
let META = {}, ACTIVE = new Set(), RAW = {nodes:[],edges:[]};
const chart = echarts.init(document.getElementById("chart"));
const say = (m, bad) => { const s=document.getElementById("statMsg"); s.textContent=m; s.className = bad?"err":""; };

async function api(path, opt={}) {
  const r = await fetch(API + path, opt);
  const b = await r.json();
  if (b.code !== 0) throw new Error(b.msg);
  return b.data;
}

/* ---------- 初始化 ---------- */
(async function boot(){
  META = await api("/meta");
  const st = await api("/stats");
  const box = document.getElementById("drawers");
  META.entity_types.forEach(t => {
    ACTIVE.add(t);
    const d = document.createElement("div");
    d.className = "drawer"; d.style.setProperty("--c", HEX[t]);
    d.setAttribute("aria-pressed","true");
    d.innerHTML = `<span>${t}</span><span class="n">${st.entity_by_type[t]||0}</span>`;
    d.onclick = () => { ACTIVE.has(t) ? ACTIVE.delete(t) : ACTIVE.add(t);
      d.setAttribute("aria-pressed", ACTIVE.has(t)); render(RAW); };
    box.appendChild(d);
  });
  META.entity_types.forEach(t => eType.add(new Option(t,t)));
  META.relation_types.forEach(t => rRel.add(new Option(t,t)));
  rRel.onchange = () => relHint.textContent = "允许：" +
    META.relation_schema[rRel.value].map(p=>p.join("→")).join("、");
  rRel.onchange();
  loadAll();
})();

/* ---------- 取数 ---------- */
async function loadAll(){
  const ents = (await api("/entities?size=500")).items;
  const rels = (await api("/relations?size=2000")).items;
  RAW = { nodes: ents.map(e=>({id:e.id,label:e.name,type:e.type})),
          edges: rels.map(r=>({source:r.source_id,target:r.target_id,label:r.relation})) };
  render(RAW); say("已载入全图");
}
async function doSearch(){
  const kw = kw_.value.trim(); if(!kw) return loadAll();
  RAW = await api(`/graph/search?keyword=${encodeURIComponent(kw)}&depth=${depth.value}`);
  render(RAW); say(RAW.nodes.length ? `检索「${kw}」` : `没找到「${kw}」`, !RAW.nodes.length);
}
const kw_ = document.getElementById("kw");
btnSearch.onclick = doSearch;
kw_.onkeydown = e => e.key==="Enter" && doSearch();
btnAll.onclick = loadAll;

/* ---------- 绘图 ---------- */
function render(g){
  const nodes = g.nodes.filter(n => ACTIVE.has(n.type));
  const ids = new Set(nodes.map(n=>n.id));
  const edges = g.edges.filter(e => ids.has(e.source) && ids.has(e.target));
  statNode.textContent = "节点 " + nodes.length;
  statEdge.textContent = "关系 " + edges.length;
  chart.setOption({
    tooltip:{formatter:p => p.dataType==="edge" ? p.data.label : `${p.data.name}<br/>${p.data.cat}`},
    legend:[{data:META.entity_types, bottom:6, textStyle:{color:"#5f6a63"}}],
    series:[{
      type:"graph", layout:"force", roam:true, draggable:true,
      categories: META.entity_types.map(t=>({name:t, itemStyle:{color:HEX[t]}})),
      force:{repulsion:260, edgeLength:[70,140], gravity:.08},
      label:{show:true, position:"right", fontSize:12, color:"#232a26"},
      edgeLabel:{show:true, fontSize:10, color:"#5f6a63", formatter:p=>p.data.label},
      edgeSymbol:["none","arrow"], edgeSymbolSize:7,
      lineStyle:{color:"#a9b2ab", curveness:.12, width:1.2},
      emphasis:{focus:"adjacency", lineStyle:{width:2.4, color:"#a8443a"}},
      data: nodes.map(n=>({id:n.id, name:n.label, cat:n.type,
        category: META.entity_types.indexOf(n.type),
        symbolSize: n.type==="方剂"||n.type==="证候" ? 42 : 30})),
      edges: edges.map(e=>({source:e.source, target:e.target, label:e.label}))
    }]
  }, true);
}
window.onresize = () => chart.resize();

chart.on("click", async p => {
  if (p.dataType !== "node") return;
  const e = await api("/entities/" + p.data.id);
  detail.innerHTML = `<span class="chip" style="background:${HEX[e.type]}">${e.type}</span> `
    + `<b>${e.name}</b>  <span style="color:var(--ink-soft)">${e.id}</span>\n`
    + (e.alias?`别名：${e.alias}\n`:"") + (e.description?`释义：${e.description}\n`:"")
    + `properties: ${JSON.stringify(e.properties, null, 1)}`;
  pSrc.value = e.name;
});
chart.on("dblclick", async p => {
  if (p.dataType !== "node") return;
  const sub = await api(`/graph/subgraph?id=${p.data.id}&depth=1`);
  const ids = new Set(RAW.nodes.map(n=>n.id));
  sub.nodes.forEach(n => !ids.has(n.id) && RAW.nodes.push(n));
  const ek = new Set(RAW.edges.map(e=>e.source+e.label+e.target));
  sub.edges.forEach(e => !ek.has(e.source+e.label+e.target) && RAW.edges.push(e));
  render(RAW); say("展开 " + p.data.name);
});

/* ---------- 路径 ---------- */
btnPath.onclick = async () => {
  try{
    const one = async v => v.match(/^[HFSZGJW]\d+$/) ? v :
      (await api(`/entities?keyword=${encodeURIComponent(v)}&size=1`)).items[0]?.id;
    const s = await one(pSrc.value.trim()), t = await one(pTgt.value.trim());
    if(!s||!t) throw new Error("起点或终点找不到对应实体");
    const {paths} = await api(`/graph/path?source_id=${s}&target_id=${t}&max_depth=4`);
    document.getElementById("paths").innerHTML = paths.length
      ? paths.map(p=>`<div class="path">${p.readable}<br><small>${p.length} 跳</small></div>`).join("")
      : `<div class="path">4 跳之内没有连通路径</div>`;
    if(paths.length){ RAW = paths[0].graph; render(RAW); }
    say(`找到 ${paths.length} 条路径`);
  }catch(e){ say(e.message, true); }
};

/* ---------- 录入 ---------- */
const post = (p, body) => api(p, {method:"POST", headers:{"Content-Type":"application/json"},
  body: JSON.stringify(body)});
btnAddE.onclick = async () => {
  try{
    const e = await post("/entities", {name:eName.value.trim(), type:eType.value,
      alias:eAlias.value, description:eDesc.value});
    say(`已录入 ${e.id} ${e.name}`); eName.value=eAlias.value=eDesc.value="";
    loadAll();
  }catch(err){ say(err.message, true); }
};
btnAddR.onclick = async () => {
  try{
    const r = await post("/relations", {source_name:rSrc.value.trim(), relation:rRel.value,
      target_name:rTgt.value.trim(), evidence:rEv.value});
    say(`已录入 ${r.source_name}-${r.relation}->${r.target_name}`); loadAll();
  }catch(err){ say(err.message, true); }
};

/* ---------- 导入 ---------- */
async function upload(file, kind){
  const fd = new FormData(); fd.append("file", file);
  const res = await api(`/import/${kind}`, {method:"POST", body:fd});
  impLog.style.display="block";
  impLog.textContent = `总 ${res.total} / 成功 ${res.success} / 失败 ${res.failed}\n`
    + res.errors.map(e=>`第 ${e.row} 行: ${e.reason}`).join("\n");
  loadAll();
}
fE.onchange = e => upload(e.target.files[0], "entities");
fR.onchange = e => upload(e.target.files[0], "relations");
</script>
</body>
</html>

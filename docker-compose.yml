services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      LLM_ENABLED: ${LLM_ENABLED:-false}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-qwen-plus}
      QDRANT_ENABLED: "true"
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-tcm_qdrant_local_dev}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-tcm_documents_v5}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-hash}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-hash-bigram-v1}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-384}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      STORE_BACKEND: ${STORE_BACKEND:-memory}
      DATA_FILE: /app/runtime/store.json
      JWT_SECRET: ${JWT_SECRET:-replace-before-production}
      MYSQL_HOST: mysql
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-tcm_local_dev}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-tcm_local_dev}
    volumes:
      - tcm_backend_data:/app/backend/data
      - tcm_graph_data:/app/runtime
    depends_on:
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.18.2
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-tcm_qdrant_local_dev}
    volumes:
      - tcm_qdrant_data:/qdrant/storage
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    profiles: ["hybrid"]
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-tcm_local_dev}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-tcm}
    volumes:
      - tcm_mysql_data:/var/lib/mysql
    restart: unless-stopped

  neo4j:
    image: neo4j:5.26-community
    profiles: ["hybrid"]
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-tcm_local_dev}
    volumes:
      - tcm_neo4j_data:/data
    restart: unless-stopped

volumes:
  tcm_backend_data:
  tcm_graph_data:
  tcm_qdrant_data:
  tcm_mysql_data:
  tcm_neo4j_data:

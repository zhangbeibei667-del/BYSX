name: release-quality

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      LLM_ENABLED: "false"
      QDRANT_ENABLED: "false"
      STORE_BACKEND: memory
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install backend
        run: pip install -r requirements.txt -r backend/requirements.txt
      - name: Install and build frontend
        working-directory: frontend
        run: npm ci && npm run build
      - name: Backend tests
        run: python -m unittest discover -s backend/tests -p "test_*.py"
      - name: Graph management tests
        run: python -m unittest server.test_functional
      - name: Knowledge graph quality gate
        run: python -m backend.scripts.check_kg_quality
      - name: Rebuild evaluation sets
        run: python -m backend.scripts.build_extended_evaluation_sets
      - name: RAG evaluation gate
        run: python -c "from backend.scripts.evaluate_rag_formal import evaluate; assert evaluate()['passed']"
      - name: Agent evaluation gate
        run: python -c "from backend.scripts.evaluate_agent_delivery import evaluate; assert evaluate()['passed']"
      - name: Secret pattern gate
        run: "! git grep -nE 'sk-(ws-)?[A-Za-z0-9._-]{20,}'"
      - name: Compose configuration
        run: docker compose config --quiet

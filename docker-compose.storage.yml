services:
  mysql:
    image: mysql:8.4
    container_name: tcm-graph-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-tcm_local_dev}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-tcm}
    ports:
      - "3306:3306"
    volumes:
      - tcm_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_PASSWORD:-tcm_local_dev}"]
      interval: 5s
      timeout: 5s
      retries: 30

  neo4j:
    image: neo4j:5.26-community
    container_name: tcm-graph-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-tcm_local_dev}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - tcm_neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30

  qdrant:
    image: qdrant/qdrant:v1.18.2
    container_name: tcm-rag-qdrant
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-tcm_qdrant_local_dev}
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - tcm_qdrant_data:/qdrant/storage

volumes:
  tcm_mysql_data:
  tcm_neo4j_data:
  tcm_qdrant_data:
